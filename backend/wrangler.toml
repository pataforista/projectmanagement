name = "workspace-backend"
main = "src/index.js"
compatibility_date = "2024-03-23"

[[d1_databases]]
binding = "DB"
database_name = "workspace-db"
database_id = "YOUR_D1_DATABASE_ID_HERE"
migrations_dir = "migrations"

[vars]
CORS_ORIGIN = "https://pataforista.github.io"
# JWT_SECRET should be set via 'wrangler secret put JWT_SECRET'
# GOOGLE_CLIENT_ID should be set via 'wrangler secret put GOOGLE_CLIENT_ID'
