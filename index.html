<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workspace de Producción</title>
    <!-- Modern Typography: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- CSS Dependencies -->
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/components.css">

    <!-- Icons (Feather Icons for elegant styling) -->
    <script src="https://unpkg.com/feather-icons"></script>
</head>

<body class="theme-dark">
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar glass-panel">
            <div class="sidebar-header">
                <div class="workspace-brand">
                    <span class="brand-icon"><i data-feather="hexagon"></i></span>
                    <span class="brand-text">Workspace</span>
                </div>
            </div>

            <nav class="sidebar-nav">
                <div class="nav-section">
                    <span class="nav-label">Vistas Globales</span>
                    <a href="#" class="nav-item active" data-view="dashboard">
                        <i data-feather="home"></i> Dashboard
                    </a>
                    <a href="#" class="nav-item" data-view="backlog">
                        <i data-feather="list"></i> Backlog
                    </a>
                    <a href="#" class="nav-item" data-view="board">
                        <i data-feather="columns"></i> Tablero
                    </a>
                    <a href="#" class="nav-item" data-view="projects">
                        <i data-feather="briefcase"></i> Proyectos
                    </a>
                    <a href="#" class="nav-item" data-view="cycles">
                        <i data-feather="refresh-cw"></i> Ciclos
                    </a>
                    <a href="#" class="nav-item" data-view="decisions">
                        <i data-feather="book-open"></i> Decisiones
                    </a>
                </div>

                <div class="nav-section">
                    <span class="nav-label">Trabajo Activo</span>
                    <a href="#" class="nav-item">
                        <span class="project-dot c-blue"></span> Artículo Investigación
                    </a>
                    <a href="#" class="nav-item">
                        <span class="project-dot c-purple"></span> Clase Semestre A
                    </a>
                </div>
            </nav>

            <div class="sidebar-footer">
                <div class="user-profile">
                    <div class="avatar">C</div>
                    <div class="user-info">
                        <span class="user-name">Carlos</span>
                        <span class="user-role">Owner</span>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <header class="topbar glass-panel">
                <div class="breadcrumbs">
                    <span>Inicio</span> <i data-feather="chevron-right"></i> <span class="current">Dashboard</span>
                </div>
                <div class="topbar-actions">
                    <button class="btn btn-icon"><i data-feather="search"></i></button>
                    <button class="btn btn-icon"><i data-feather="bell"></i></button>
                    <button class="btn btn-primary"><i data-feather="plus"></i> Nuevo</button>
                </div>
            </header>

            <div class="content-view" id="app-root">
                <!-- View header (updated dynamically by router) -->
                <div class="view-header">
                    <h1>Dashboard</h1>
                    <p class="subtitle">Resumen de tu actividad y próximos entregables.</p>
                </div>

                <!-- Dynamic content rendered here by app.js -->
                <div id="view-content">
                    <div class="loading-state"><div class="spinner"></div></div>
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="js/db.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
