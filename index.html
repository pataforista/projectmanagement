<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#09090b">
  <meta name="description"
    content="Workspace de Producción — Gestión colaborativa de proyectos académicos y creativos.">

  <title>Workspace de Producción</title>

  <link rel="manifest" href="manifest.json">

  <!-- Modern Typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="styles/main.css">
  <link rel="stylesheet" href="styles/components.css">

  <!-- Feather Icons -->
  <script src="https://unpkg.com/feather-icons/dist/feather.min.js"></script>
</head>

<body class="theme-dark">
  <div class="app-container">

    <!-- ── Sidebar ──────────────────────────────────────────────────────────── -->
    <aside class="sidebar glass-panel">
      <div class="sidebar-header">
        <div class="workspace-brand">
          <div class="brand-icon"><i data-feather="hexagon"></i></div>
          <span class="brand-text">Workspace</span>
        </div>
        <button class="btn-sidebar-toggle" id="btn-sidebar-toggle">
          <i data-feather="chevron-left"></i>
        </button>
      </div>

      <nav class="sidebar-nav">

        <div class="nav-section">
          <span class="nav-label">Global</span>
          <a class="nav-item" data-view="dashboard" href="#/dashboard">
            <i data-feather="home"></i> Dashboard
          </a>
          <a class="nav-item" data-view="board" href="#/board">
            <i data-feather="layout"></i> Tablero
          </a>
          <a class="nav-item" data-view="backlog" href="#/backlog">
            <i data-feather="inbox"></i> Backlog
          </a>
          <a class="nav-item" data-view="calendar" href="#/calendar">
            <i data-feather="calendar"></i> Calendario
          </a>
        </div>

        <div class="nav-section">
          <span class="nav-label">Producción</span>
          <a class="nav-item" data-view="projects" href="#/projects">
            <i data-feather="briefcase"></i> Proyectos
          </a>
          <a class="nav-item" data-view="cycles" href="#/cycles">
            <i data-feather="refresh-cw"></i> Ciclos
          </a>
          <a class="nav-item" data-view="decisions" href="#/decisions">
            <i data-feather="zap"></i> Decisiones
          </a>
          <a class="nav-item" data-view="logs" href="#/logs">
            <i data-feather="activity"></i> Actividad
          </a>
        </div>

        <div class="nav-section">
          <span class="nav-label">Proyectos</span>
          <div id="sidebar-projects">
            <!-- Injected by app.js -->
          </div>
        </div>

      </nav>

      <div class="sidebar-footer">
        <div class="footer-actions">
          <button class="btn-theme-toggle" id="btn-theme-toggle" title="Cambiar tema">
            <i data-feather="sun" class="sun-icon"></i>
            <i data-feather="moon" class="moon-icon"></i>
          </button>
          <button class="btn btn-icon" id="btn-sync-toggle" onclick="syncManager.authenticate()"
            title="Conectar Google Drive" style="position:relative;">
            <i data-feather="cloud"></i>
            <span class="status-indicator status-offline" id="sync-indicator"></span>
          </button>
          <button class="btn btn-icon" id="btn-export" onclick="exportData()" title="Exportar datos (JSON)">
            <i data-feather="download"></i>
          </button>
        </div>
        <div class="user-profile">
          <div class="avatar" id="user-avatar">C</div>
          <div class="user-info">
            <span class="user-name" id="user-name">Carlos</span>
            <span class="user-role" id="user-role">Owner</span>
          </div>
        </div>
      </div>
    </aside>

    <!-- ── Main Content ─────────────────────────────────────────────────────── -->
    <main class="main-content">

      <!-- Topbar -->
      <header class="topbar glass-panel">
        <div class="breadcrumbs">
          <span>Workspace</span>
          <i data-feather="chevron-right"></i>
          <span class="current">Dashboard</span>
        </div>
        <div class="topbar-actions">
          <button class="btn btn-icon" id="btn-search" title="Buscar (Ctrl+K)">
            <i data-feather="search"></i>
          </button>
          <button class="btn btn-primary" id="btn-new-global">
            <i data-feather="plus"></i> Nuevo
          </button>
        </div>
      </header>

      <!-- Dynamic view content -->
      <div class="content-view">
        <div id="app-root">
          <!-- Rendered by router + view modules -->
        </div>
      </div>

    </main>
  </div>

  <!-- ── Global UI overlays ──────────────────────────────────────────────────── -->

  <!-- Search overlay -->
  <div id="search-overlay">
    <div class="search-box">
      <div class="search-input-wrap">
        <i data-feather="search"></i>
        <input id="search-input" type="text" placeholder="Buscar tareas, proyectos…" autocomplete="off">
        <kbd
          style="font-size:0.7rem;color:var(--text-muted);border:1px solid var(--border-color);border-radius:4px;padding:2px 5px;">ESC</kbd>
      </div>
      <div class="search-results" id="search-results">
        <div class="search-hint">Escribe para buscar tareas y proyectos…</div>
      </div>
    </div>
  </div>

  <!-- Toast container -->
  <div id="toast-container"></div>

  <!-- ── Scripts ─────────────────────────────────────────────────────────────── -->
  <!-- Load order matters: db → utils → store → router → views → modals → app -->
  <script src="js/db.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/components.js"></script>
  <script src="js/store.js"></script>
  <script src="js/router.js"></script>

  <!-- View modules -->
  <script src="js/views/dashboard.js"></script>
  <script src="js/views/projects.js"></script>
  <script src="js/views/backlog.js"></script>
  <script src="js/views/cycles.js"></script>
  <script src="js/views/board.js"></script>
  <script src="js/views/calendar.js"></script>
  <script src="js/views/document.js"></script>
  <script src="js/views/decisions.js"></script>
  <script src="js/views/logs.js"></script>

  <!-- Modals + Bootstrap -->
  <script src="js/modals.js"></script>
  <script src="js/sync.js"></script>
  <script src="js/app.js"></script>

</body>

</html>
